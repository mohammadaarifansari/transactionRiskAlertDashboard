server.port=8080

# Structured logging
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level %logger{36} - %msg%n
logging.level.com.riskdashboard=INFO
logging.level.org.springframework.web=WARN

# Disable banner for cleaner output
spring.main.banner-mode=off

# Jackson serialisation settings — consistent camelCase, no null fields in responses
spring.jackson.default-property-inclusion=NON_NULL
spring.jackson.serialization.write-dates-as-timestamps=false
